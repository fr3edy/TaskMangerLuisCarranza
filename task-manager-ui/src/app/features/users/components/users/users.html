<div class="flex flex-col h-full max-w-7xl mx-auto">
  
  <div class="flex justify-between items-end mb-6">
    <div>
      <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-1">User Management</h1>
      <p class="text-slate-500 text-sm">Control access, roles, and administrative permissions.</p>
    </div>
    <div class="flex gap-3">
      <button routerLink="/users/create" 
        class="bg-[#0f62fe] text-white rounded-md px-4 py-2 flex items-center gap-2 text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm">
        <mat-icon fontIcon="person_add" class="!w-4 !h-4 !text-[18px] leading-none"></mat-icon>
        Invite User
      </button>
    </div>
  </div>

  <div class="bg-white rounded-lg border border-slate-200 shadow-sm flex flex-col">
    
    <div class="flex justify-between items-center px-6 py-4 border-b border-slate-100">
      <span class="text-sm text-slate-500">System Administrators & Users</span>
      <div class="flex gap-3 text-slate-400">
        <button (click)="loadUsers()" class="hover:text-blue-600 transition-colors">
          <mat-icon fontIcon="refresh" class="!w-5 !h-5 !text-[20px]"></mat-icon>
        </button>
      </div>
    </div>

    <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-20">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#0f62fe]"></div>
    </div>

    <div *ngIf="!isLoading" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b border-slate-200 text-slate-500 font-mono text-[11px] uppercase tracking-wider font-semibold bg-slate-50/50">
            <th class="py-3 px-6">USER / EMAIL</th>
            <th class="py-3 px-6">ROLE</th>
            <th class="py-3 px-6">STATUS</th>
            <th class="py-3 px-6 text-center">ACTIONS</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100 text-sm">
          <tr *ngFor="let user of users" class="hover:bg-slate-50 transition-colors group">
            <td class="py-4 px-6">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-bold text-xs uppercase">
                  {{ user.name.charAt(0) }}
                </div>
                <div class="flex flex-col">
                  <span class="font-medium text-slate-800 capitalize">{{ user.name }}</span>
                  <span class="text-xs text-slate-500">{{ user.email }}</span>
                </div>
              </div>
            </td>
            <td class="py-4 px-6 text-slate-600">
              <span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded-md border border-slate-200">{{ user.role }}</span>
            </td>
            <td class="py-4 px-6">
              <span class="text-xs font-semibold px-2 py-1 rounded-md text-green-600 bg-green-50">
                {{ user.status }}
              </span>
            </td>
            <td class="py-4 px-6 text-center">
              <div class="flex items-center justify-center gap-2 text-slate-400 opacity-50 group-hover:opacity-100 transition-opacity">
                <button class="hover:text-blue-600"><mat-icon fontIcon="edit" class="!w-4 !h-4 !text-[18px]"></mat-icon></button>
                <button class="hover:text-red-500"><mat-icon fontIcon="block" class="!w-4 !h-4 !text-[18px]"></mat-icon></button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
