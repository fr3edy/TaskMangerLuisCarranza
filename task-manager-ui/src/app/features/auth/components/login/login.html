<div class="min-h-screen bg-neutral flex items-center justify-center p-4">
  
  <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-8">
    
    <div class="flex flex-col items-center mb-8">
      <div class="bg-primary text-white w-12 h-12 rounded-lg flex items-center justify-center mb-4 shadow-md">
        <mat-icon fontIcon="architecture"></mat-icon> 
      </div>
      <h1 class="text-2xl font-bold text-primary font-sans">CoreArch Admin</h1>
      <p class="text-tertiary text-sm mt-1">Enterprise Management</p>
    </div>
    <div *ngIf="errorMessage" class="mb-5 p-3 bg-red-50 text-red-600 border border-red-200 rounded-lg text-sm font-medium text-center shadow-sm transition-all">
      <mat-icon fontIcon="error_outline" class="align-middle !w-5 !h-5 !text-[20px] mr-1"></mat-icon>
      <span class="align-middle">{{ errorMessage }}</span>
    </div>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-primary mb-1 font-mono">Email address</label>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="admin@enterprise.com"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-colors bg-neutral/50">
        
        <span class="text-red-500 text-xs mt-1 font-medium" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">El email es obligatorio</span>
        <span class="text-red-500 text-xs mt-1 font-medium" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">Formato inválido</span>
      </div>

      <div class="flex flex-col">
        <div class="flex justify-between items-center mb-1">
          <label class="text-sm font-semibold text-primary font-mono">Password</label>
          <a href="#" class="text-sm text-secondary hover:underline font-medium">Forgot password?</a>
        </div>
        <input 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-colors bg-neutral/50">
        
        <span class="text-red-500 text-xs mt-1 font-medium" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">La contraseña es obligatoria</span>
      </div>

      <div class="mt-1">
        <mat-checkbox formControlName="rememberMe" color="primary">
          <span class="text-sm text-tertiary font-medium">Remember me</span>
        </mat-checkbox>
      </div>

      <button 
        mat-flat-button 
        color="primary" 
        type="submit" 
        class="w-full !bg-secondary !text-white !rounded-lg !py-6 !text-base font-semibold hover:opacity-90 transition-opacity mt-2">
        Log In
      </button>

    </form>

    <div class="mt-8 text-center">
      <p class="text-sm text-tertiary">
        Need technical support? <a href="#" class="text-secondary hover:underline font-medium">Contact IT</a>
      </p>
    </div>

  </div>
</div>
